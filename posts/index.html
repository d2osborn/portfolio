<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Blog - Diego Osborn</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body class="sub-page">

  <!-- Apply dark mode before paint to prevent flash -->
  <script>
    const theme = sessionStorage.getItem('theme');
    const match = window.matchMedia("(prefers-color-scheme: dark)").matches;
    if ((theme && theme === 'dark') || (!theme && match)) {
      document.body.classList.add('dark');
    }
  </script>

  <main>
    <!-- Sub-page header with back link and theme toggle -->
    <header class="sub-header">
      <a href="../" class="back-link">← Back to home</a>
      
      <button id="theme-toggle" aria-label="theme switch">
        <span class="moon-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></span>
        <span class="sun-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></span>
      </button>
    </header>

    <h1 class="page-title">Blog Posts</h1>

    <div class="post-list">
      <!-- <a class="post-link" href="bda-baseball-ch2/">
        <span>BDA &amp; Baseball, Chapter 2: Probability and Inference</span>
        <span class="date">2026-06-18</span>
      </a> -->
      <a class="post-link" href="bda-baseball-ch1/">
        <span>BDA, Chapter 1: Probability and Inference</span>
        <span class="date">07-01-2026</span>
      </a>
      <a class="post-link" href="about-me/">
        <span>A Little About Me</span>
        <span class="date">06-17-2026</span>
      </a>
      <!-- 
        To add a new post, copy the <a> block above and update:
        1. href — the folder name for the post (e.g. "bda-baseball-ch2/")
        2. The title text
        3. The date
        Keep newest posts at the top.
      -->
    </div>

  </main>

  <script>
    // --------------------------
    // Dark / Light theme toggle
    // --------------------------
    const toggle = document.getElementById('theme-toggle');
    if (toggle) {
      toggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        sessionStorage.setItem(
          'theme',
          document.body.classList.contains('dark') ? 'dark' : 'light'
        );
      });
    }
  </script>
</body>
</html>
